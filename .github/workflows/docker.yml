name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, e.g. 1.0.0 or v1.0.0"
        required: true
        default: "1.0.0"
        type: string
      push_latest:
        description: "Also push the latest tag"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKERHUB_IMAGE: rustfs/operator
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/operator
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  push-operator-images:
    name: Build and Push Operator Image
    runs-on: operator-sm-standard-2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize version and tags
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
            CREATE_LATEST="${{ github.event.inputs.push_latest }}"
            IS_PRERELEASE=false
          else
            RAW="${{ github.event.release.tag_name }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"

            if [ "$IS_PRERELEASE" = "true" ]; then
              CREATE_LATEST=false
            else
              CREATE_LATEST=true
            fi
          fi

          RAW_TAG="${RAW#refs/tags/}"
          VERSION="${RAW_TAG#v}"

          if [ -z "$VERSION" ]; then
            echo "Version is empty"
            exit 1
          fi

          # For manually triggered builds, infer prerelease from version name.
          case "$VERSION" in
            *alpha*|*beta*|*rc*)
              IS_PRERELEASE=true
              CREATE_LATEST=false
              ;;
          esac

          {
            echo "version=$VERSION"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "create_latest=$CREATE_LATEST"
          } >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "${DOCKERHUB_IMAGE}:${VERSION}"
            echo "${GHCR_IMAGE}:${VERSION}"

            if [ "$CREATE_LATEST" = "true" ]; then
              echo "${DOCKERHUB_IMAGE}:latest"
              echo "${GHCR_IMAGE}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Docker version: $VERSION"
          echo "Prerelease: $IS_PRERELEASE"
          echo "Create latest: $CREATE_LATEST"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.title=RustFS Operator
            org.opencontainers.image.description=RustFS Kubernetes Operator
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
